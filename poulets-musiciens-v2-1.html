<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐔 Poulets Musiciens v2-1</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none}
:root{
  --bar-bg:rgba(255,255,255,0.85);--bar-border:#f0c040;
  --txt:#3d2200;--sel-bg:#fff8e0;--sel-border:#c8860a;

}
body.dark{
  --bar-bg:rgba(12,12,36,0.92);--bar-border:#3030aa;
  --txt:#ffd980;--sel-bg:#1a1a3e;--sel-border:#5050cc;
  --minor-bg:#1a1a4a;--minor-border:#6080ff;
}
body{background:#87ceeb;font-family:'Nunito',sans-serif;transition:background .4s}

#topbar{

}

<body>
<div id="topbar">
  <span id="title">🐔 Poulets Musiciens</span>
  <select id="soundSel">
    <optgroup label="── Soufflés ──">
      <option value="flute">🪈 Flûte</option>
      <option value="trumpet">🎺 Trompette</option>
      <option value="voice">🎤 Voix</option>
    </optgroup>
    <optgroup label="── Claviers ──">
      <option value="piano">🎹 Piano</option>
      <option value="harpsichord">🎼 Clavecin</option>
      <option value="organ">🎹 Orgue</option>
      <option value="synth">⚡ Synth</option>
    </optgroup>
    <optgroup label="── Cordes ──">
      <option value="violin">🎻 Violon</option>
      <option value="guitar">🎸 Guitare</option>
      <option value="bass">🎸 Basse élec.</option>
      <option value="banjo">🪕 Banjo</option>
      <option value="sitar">🪕 Sitar</option>
      <option value="oud">🪗 Oud</option>
    </optgroup>
    <optgroup label="── Percussions ──">
      <option value="xylophone">🎵 Xylophone</option>
      <option value="marimba">🎵 Marimba</option>
    </optgroup>
  </select>
  <button id="scaleBtn">Fa Maj ♩</button>
  <button id="darkBtn">🌙</button>
</div>
<canvas id="cvs"></canvas>
<script>
'use strict';

/* ═══════════════════════════════════════════════════════
   GAMMES
   ═══════════════════════════════════════════════════════ */
const SCALES = {
  major: [0,2,4,5,7,9,11,12,14,16,17,19,21,23,24,26,28,29,31],
  minor: [0,2,3,5,7,8,10,12,14,15,17,19,20,22,24,26,27,29,31]
};
const SCALE_FULL = {
  major:['Fa3','Sol3','La3','Si♭3','Do4','Ré4','Mi4','Fa4','Sol4','La4','Si♭4','Do5','Ré5','Mi5','Fa5','Sol5','La5','Si♭5','Do6'],
  minor:['Fa3','Sol3','La♭3','Si♭3','Do4','Ré♭4','Mi♭4','Fa4','Sol4','La♭4','Si♭4','Do5','Ré♭5','Mi♭5','Fa5','Sol5','La♭5','Si♭5','Do6']
};
const SCALE_SHORT = {
  major:['Fa','Sol','La','Si♭','Do','Ré','Mi','Fa','Sol','La','Si♭','Do','Ré','Mi','Fa'],
  minor:['Fa','Sol','La♭','Si♭','Do','Ré♭','Mi♭','Fa','Sol','La♭','Si♭','Do','Ré♭','Mi♭','Fa']
};
const FA3 = 174.614;
let gamme = 'major';
let currentIdx = 0;

function snapToScale(raw){
  const rawS=Math.max(0,Math.min(1,raw))*24;
  let best=0,dist=Infinity;
  for(let i=0;i<=14;i++){const d=Math.abs(SCALES[gamme][i]-rawS);if(d<dist){dist=d;best=i;}}
  return best;
}
function idxToStretch(idx){return SCALES[gamme][Math.min(idx,14)]/24;}
function idxToFreq(idx){return FA3*Math.pow(2,SCALES[gamme][Math.min(idx,SCALES[gamme].length-1)]/12);}
function compIdx(base,offset){return Math.min(base+offset,SCALES[gamme].length-1);}

/* ─── Canvas ─────────────────────────────────────────── */
const cvs=document.getElementById('cvs');
const ctx=cvs.getContext('2d');
let W=0,H=0;
function resize(){
  W=window.innerWidth;H=window.innerHeight-52;
  cvs.width=W*devicePixelRatio;cvs.height=H*devicePixelRatio;
  cvs.style.width=W+'px';cvs.style.height=H+'px';
  ctx.scale(devicePixelRatio,devicePixelRatio);
}
window.addEventListener('resize',resize);resize();

/* ─── État ───────────────────────────────────────────── */
let dark=false,sndType='flute';
let ac=null;
let playing=false,leftTId=-1;
let leftStretch=0,animStretch=0,stretchVel=0;
let midOn=false,rightOn=false;
const sounds=[null,null,null];
const lastIdxs=[-1,-1,-1];
const parts=[];
const togglePulse=[0,0,0];

function getAC(){
  if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();
  if(ac.state==='suspended')ac.resume();
  return ac;
}

/* ═══════════════════════════════════════════════════════
   MOTEUR AUDIO — CSound
   Instruments soutenus : enveloppe sur master.gain
   Instruments plaqués  : envNode entre sources et master
   ═══════════════════════════════════════════════════════ */
const PLUCKED=new Set(['piano','harpsichord','xylophone','marimba','guitar','bass','banjo','sitar','oud']);

class CSound {
  constructor(freq, type){
    this.ac=getAC(); this.baseFreq=freq; this.type=type;
    this.isPlucked=PLUCKED.has(type);
    this.oscs=[]; this._lfo=null; this._lfoG=null;
    this._filters=[];

    this.master=this.ac.createGain();
    this.master.connect(this.ac.destination);

    if(this.isPlucked){
      this.envNode=this.ac.createGain();
      this.envNode.gain.value=0;
      this.envNode.connect(this.master);
      this.master.gain.value=0.42;
      this._d=this.envNode;
    } else {
      this._d=this.master;
      this.master.gain.setValueAtTime(0.001,this.ac.currentTime);
    }

    this._build();

    if(this.isPlucked){ this._fireEnv(); }
    else { this.master.gain.linearRampToValueAtTime(0.35,this.ac.currentTime+0.09); }
  }

  /* Nœud oscillateur */
  _osc(type,rel,gain,dest){
    const o=this.ac.createOscillator(),g=this.ac.createGain();
    o.type=type; o.frequency.value=this.baseFreq*rel; g.gain.value=gain;
    o.connect(g); g.connect(dest||this._d); o.start();
    this.oscs.push({o,rel}); return g;
  }

  /* Paramètres ADSR selon instrument */
  _envP(){
    switch(this.type){
      case 'piano':       return {a:.012,d:.7, s:.22,r:.9};
      case 'harpsichord': return {a:.005,d:.22,s:.04,r:.08};
      case 'xylophone':   return {a:.005,d:.28,s:.0, r:.05};
      case 'marimba':     return {a:.005,d:.55,s:.0, r:.1};
      case 'guitar':      return {a:.01, d:.65,s:.07,r:.3};
      case 'bass':        return {a:.02, d:.35,s:.5, r:.3};
      case 'banjo':       return {a:.005,d:.32,s:.05,r:.15};
      case 'sitar':       return {a:.03, d:.5, s:.28,r:.6};
      case 'oud':         return {a:.008,d:.85,s:.06,r:.5};
      default:            return {a:.01, d:.3, s:.5, r:.3};
    }
  }

  _fireEnv(){
    if(!this.isPlucked) return;
    const t=this.ac.currentTime, p=this._envP(), env=this.envNode.gain;
    env.cancelScheduledValues(t);
    env.setValueAtTime(0,t);
    env.linearRampToValueAtTime(1.0, t+p.a);
    env.linearRampToValueAtTime(p.s, t+p.a+p.d);
    if(p.s<0.01){
      env.linearRampToValueAtTime(0.0001,t+p.a+p.d+0.4);
    }
  }

  retrigger(){if(this.isPlucked)this._fireEnv();}

  _addFilter(type,freq,Q,dest){
    const f=this.ac.createBiquadFilter();
    f.type=type; f.frequency.value=freq; f.Q.value=Q;
    f.connect(dest||this._d); this._filters.push(f); return f;
  }

  _build(){
    const f=this.baseFreq;
    switch(this.type){

      /* ── SOUFFLÉS ── */
      case 'flute':
        this._osc('sine',1,1.0);
        this._osc('sine',2,0.10);
        this._osc('sine',3,0.03);
        break;

      case 'trumpet':
        this._osc('square',1,0.42);
        this._osc('sine',2,0.28);
        this._osc('sine',3,0.18);
        this._osc('sine',4,0.10);
        this._osc('sine',5,0.05);
        break;

      case 'voice':{
        const lfo=this.ac.createOscillator(),lg=this.ac.createGain();
        lfo.frequency.value=5.5; lg.gain.value=f*0.014;
        lfo.connect(lg); lfo.start(); this._lfo=lfo; this._lfoG=lg;
        [1,2,3,4].forEach((h,i)=>{
          const o=this.ac.createOscillator(),g=this.ac.createGain();
          o.type='sine'; o.frequency.value=f*h; g.gain.value=[1,.45,.22,.07][i];
          o.connect(g); g.connect(this._d); lg.connect(o.frequency); o.start();
          this.oscs.push({o,rel:h});
        }); break;}

      /* ── CLAVIERS ── */
      case 'piano':{
        // Harmoniques avec légère détune pour richesse
        this._osc('sine',1,1.0);
        this._osc('sine',2,0.42);
        this._osc('sine',3,0.20);
        this._osc('sine',4,0.09);
        this._osc('sine',6,0.03);
        // Doublure légèrement désaccordée
        const od=this.ac.createOscillator(),gd=this.ac.createGain();
        od.type='sine'; od.frequency.value=f*1.0007; gd.gain.value=0.35;
        od.connect(gd); gd.connect(this._d); od.start();
        this.oscs.push({o:od,rel:1.0007});
        break;}

      case 'harpsichord':{
        // Son sec et brillant, sawtooth filtré haut
        const lp=this._addFilter('lowpass',f*9,0.4);
        this._osc('sawtooth',1,0.72,lp);
        this._osc('sine',2,0.32,lp);
        this._osc('sine',3,0.16,lp);
        this._osc('sine',4,0.07,lp);
        break;}

      case 'organ':
        this._osc('sine',1,1.0);
        this._osc('sine',2,0.50);
        this._osc('sine',3,0.25);
        this._osc('sine',4,0.12);
        this._osc('sine',6,0.06);
        break;

      case 'synth':{
        const lp=this._addFilter('lowpass',1700,4.5);
        this._osc('sawtooth',1,0.75,lp);
        this._osc('sawtooth',0.502,0.18,lp);
        break;}

      /* ── CORDES FROTTÉES ── */
      case 'violin':{
        const lp=this._addFilter('lowpass',f*5.5,0.7);
        this._osc('sawtooth',1,0.65,lp);
        this._osc('sawtooth',2,0.22,lp);
        this._osc('sine',3,0.08,lp);
        break;}

      /* ── CORDES PINCÉES ── */
      case 'guitar':{
        // Corps chaud, attaque brillante
        const hp=this.ac.createBiquadFilter();
        hp.type='highpass'; hp.frequency.value=f*0.7; hp.Q.value=0.3;
        const lp=this._addFilter('lowpass',f*4.5,1.1);
        hp.connect(lp);
        this._osc('sawtooth',1,0.62,hp);
        this._osc('sine',2,0.22,hp);
        this._osc('sine',3,0.10,hp);
        // Légère désaccordure pour réalisme
        const od=this.ac.createOscillator(),gd=this.ac.createGain();
        od.type='sine'; od.frequency.value=f*0.998; gd.gain.value=0.14;
        od.connect(gd); gd.connect(lp); od.start(); this.oscs.push({o:od,rel:0.998});
        break;}

      case 'bass':{
        // Fondamentale ronde, peu d'harmoniques
        const lp=this._addFilter('lowpass',f*2.8,0.7);
        this._osc('sine',1,0.9,lp);
        this._osc('triangle',1,0.25,lp);
        this._osc('sine',2,0.28,lp);
        this._osc('sine',3,0.06,lp);
        break;}

      case 'banjo':{
        // Brillant, nasal, attaque sèche
        const hp=this.ac.createBiquadFilter();
        hp.type='highpass'; hp.frequency.value=f*0.9; hp.Q.value=0.4;
        const lp=this._addFilter('lowpass',f*7,0.8);
        hp.connect(lp);
        this._osc('sawtooth',1,0.70,hp);
        this._osc('sine',2,0.30,hp);
        this._osc('sine',3,0.14,hp);
        this._osc('sine',4,0.06,hp);
        break;}

      case 'sitar':{
        // Buzz caractéristique + sympathiques désaccordés
        const lfo=this.ac.createOscillator(),lg=this.ac.createGain();
        lfo.frequency.value=7; lg.gain.value=f*0.009;
        lfo.connect(lg); lfo.start(); this._lfo=lfo; this._lfoG=lg;
        const lp=this._addFilter('lowpass',f*5,2.2);
        [1,2,3,4,5].forEach((h,i)=>{
          const o=this.ac.createOscillator(),g=this.ac.createGain();
          o.type='sawtooth'; o.frequency.value=f*h;
          g.gain.value=[1,.48,.24,.10,.05][i];
          o.connect(g); g.connect(lp); lg.connect(o.frequency); o.start();
          this.oscs.push({o,rel:h});
        });
        // Cordes sympathiques légèrement désaccordées
        [{r:1.002,v:.13},{r:2.004,v:.07},{r:3.001,v:.04}].forEach(({r,v})=>{
          const o=this.ac.createOscillator(),g=this.ac.createGain();
          o.type='sine'; o.frequency.value=f*r; g.gain.value=v;
          o.connect(g); g.connect(this._d); o.start(); this.oscs.push({o,rel:r});
        });
        break;}

      case 'oud':{
        // Chaleureux, mellow, timbre proche de l'instrument acoustique
        const lp=this._addFilter('lowpass',f*3.8,1.2);
        this._osc('sawtooth',1,0.58,lp);
        this._osc('sine',2,0.30,lp);
        this._osc('sine',3,0.14,lp);
        this._osc('sine',4,0.06,lp);
        // Légère désaccordure
        const od=this.ac.createOscillator(),gd=this.ac.createGain();
        od.type='triangle'; od.frequency.value=f*0.997; gd.gain.value=0.18;
        od.connect(gd); gd.connect(lp); od.start(); this.oscs.push({o:od,rel:0.997});
        break;}

      /* ── PERCUSSIONS MÉLODIQUES ── */
      case 'xylophone':
        // Partiels non harmoniques typiques du xylophone
        this._osc('sine',1,1.0);
        this._osc('sine',2.76,0.28);  // partiel caractéristique
        this._osc('sine',5.4,0.10);
        this._osc('sine',8.9,0.04);
        break;

      case 'marimba':
        // Plus doux, plus de corps que le xylophone
        this._osc('sine',1,1.0);
        this._osc('sine',3.99,0.22);  // quarte basse caractéristique
        this._osc('sine',10.6,0.07);
        break;
    }
  }

  setFreq(freq){
    if(Math.abs(freq-this.baseFreq)<1) return;
    this.baseFreq=freq;
    const t=this.ac.currentTime;
    this.oscs.forEach(({o,rel})=>o.frequency.setTargetAtTime(freq*rel,t,0.02));
    if(this._lfoG) this._lfoG.gain.setTargetAtTime(freq*0.009,t,0.02);
  }

  stop(){
    const t=this.ac.currentTime;
    const target=this.isPlucked ? this.envNode.gain : this.master.gain;
    target.setTargetAtTime(0.0001,t,0.12);
    setTimeout(()=>{
      this.oscs.forEach(({o})=>{try{o.stop()}catch(e){}});
      if(this._lfo){try{this._lfo.stop()}catch(e){}}
      try{this.master.disconnect()}catch(e){}
    },1400);
  }
}

/* ─── Gestion sons ───────────────────────────────────── */
function stopAll(){for(let i=0;i<3;i++){if(sounds[i]){sounds[i].stop();sounds[i]=null;lastIdxs[i]=-1;}}}

function updateSounds(){
  const act=[true,midOn,rightOn];
  const idxs=[currentIdx,compIdx(currentIdx,2),compIdx(currentIdx,4)];
  for(let i=0;i<3;i++){
    const should=playing&&act[i];
    const freq=idxToFreq(idxs[i]);
    if(should){
      if(!sounds[i]){
        sounds[i]=new CSound(freq,sndType);
        lastIdxs[i]=idxs[i];
      } else {
        const changed=idxs[i]!==lastIdxs[i];
        sounds[i].setFreq(freq);
        if(changed){sounds[i].retrigger();lastIdxs[i]=idxs[i];}
      }
    } else {
      if(sounds[i]){sounds[i].stop();sounds[i]=null;lastIdxs[i]=-1;}
    }
  }
}

/* ─── Layout ─────────────────────────────────────────── */
function lay(i){
  const cw=W/3,cx=cw*i+cw/2;
  const bW=Math.min(cw*0.58,105),bH=bW*0.72,hR=bW*0.335;
  const bodyY=H*0.79,bodyTop=bodyY-bH/2;
  const headRest=bodyTop-hR-6,headMax=hR+18;
  return{cx,cw,bW,bH,hR,bodyY,bodyTop,headRest,headMax};
}
function headY(str,i){const l=lay(i);return l.headRest-str*(l.headRest-l.headMax);}
function strFromY(y){const l=lay(0);const c=Math.max(l.headMax,Math.min(l.headRest,y));return(l.headRest-c)/(l.headRest-l.headMax);}

function rRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

/* ─── Fond ───────────────────────────────────────────── */
function drawBg(){
  const sky=ctx.createLinearGradient(0,0,0,H*0.85);
  if(dark){sky.addColorStop(0,'#040412');sky.addColorStop(1,'#0e0e2a');}
  else{sky.addColorStop(0,'#87ceeb');sky.addColorStop(1,'#c8e8f5');}
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
  if(dark){
    ctx.fillStyle='rgba(255,255,255,0.9)';
    for(let i=0;i<55;i++){
      const x=((i*7919+3)%1000)/1000*W,y=((i*5039+11)%1000)/1000*H*0.73;
      ctx.beginPath();ctx.arc(x,y,(i%4)*0.45+0.3,0,Math.PI*2);ctx.fill();
    }
    ctx.fillStyle='#fffde0';ctx.shadowColor='rgba(255,255,200,0.5)';ctx.shadowBlur=15;
    ctx.beginPath();ctx.arc(W*0.85,H*0.12,18,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#0e0e2a';ctx.shadowBlur=0;
    ctx.beginPath();ctx.arc(W*0.85+10,H*0.12-5,14,0,Math.PI*2);ctx.fill();
  } else {
    ctx.fillStyle='#ffd700';ctx.shadowColor='rgba(255,200,0,0.5)';ctx.shadowBlur=20;
    ctx.beginPath();ctx.arc(W*0.88,H*0.11,22,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  }
  const gY=H*0.92;
  const gc=ctx.createLinearGradient(0,gY,0,H);
  if(dark){gc.addColorStop(0,'#1a1a3a');gc.addColorStop(1,'#0d0d22');}
  else{gc.addColorStop(0,'#6abf47');gc.addColorStop(1,'#4a9e2f');}
  ctx.fillStyle=gc;ctx.fillRect(0,gY,W,H-gY);
  ctx.save();ctx.setLineDash([6,14]);
  ctx.strokeStyle=dark?'rgba(100,100,255,0.12)':'rgba(0,0,0,0.06)';ctx.lineWidth=1.5;
  [W/3,2*W/3].forEach(x=>{ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,gY);ctx.stroke();});
  ctx.restore();
}

/* ─── Repère de gamme ────────────────────────────────── */
function drawGaugePanel(){
  const l=lay(0);
  const bBot=l.headRest+5,bTop=l.headMax-5,gH=bBot-bTop;
  const panW=50,gx=panW-5;
  ctx.save();
  rRect(0,bTop,panW,gH,8);
  ctx.fillStyle=dark?'rgba(0,0,20,0.62)':'rgba(255,255,240,0.75)';ctx.fill();
  ctx.strokeStyle=dark?'rgba(180,180,255,0.3)':'rgba(180,140,0,0.3)';
  ctx.lineWidth=1;ctx.setLineDash([]);
  ctx.beginPath();ctx.moveTo(gx,bTop+8);ctx.lineTo(gx,bBot-8);ctx.stroke();
  const scale=SCALES[gamme],shorts=SCALE_SHORT[gamme];
  for(let i=0;i<=14;i++){
    const ratio=scale[i]/24,y=bBot-ratio*gH;
    const isOct=(i===0||i===7||i===14),isCur=playing&&(i===currentIdx);
    const colCur=dark?'#ffd700':'#e05000';
    const colOct=dark?'rgba(210,210,255,0.88)':'rgba(80,50,0,0.88)';
    const colOther=dark?'rgba(150,150,255,0.48)':'rgba(140,100,0,0.48)';
    const col=isCur?colCur:isOct?colOct:colOther;
    const tickLen=isOct?10:5;
    ctx.strokeStyle=col;ctx.lineWidth=isCur?2.5:isOct?1.5:0.8;
    ctx.beginPath();ctx.moveTo(gx,y);ctx.lineTo(gx-tickLen,y);ctx.stroke();
    const label=isOct?(i===0?'Fa3':i===7?'Fa4':'Fa5'):shorts[i];
    ctx.font=`${isOct?'700':'400'} ${isOct?8.5:7.5}px 'Nunito',sans-serif`;
    ctx.textAlign='right';ctx.fillStyle=isCur?colCur:isOct?colOct:colOther;
    ctx.fillText(label,gx-tickLen-2,y+3);
  }
  if(playing){
    const ratio=idxToStretch(currentIdx),y=bBot-ratio*gH;
    ctx.beginPath();ctx.arc(gx,y,5.5,0,Math.PI*2);
    ctx.fillStyle=dark?'#ffd700':'#e05000';
    ctx.shadowColor=dark?'#ffd700':'#e05000';ctx.shadowBlur=10;
    ctx.fill();ctx.shadowBlur=0;
  }
  ctx.restore();
}

/* ─── Cou ─────────────────────────────────────────────── */
function drawNeck(cx,topY,botY,topW,botW,str){
  if(botY>=topY)return;
  const len=topY-botY,segs=Math.max(4,Math.floor(str*22)+4);
  ctx.beginPath();
  ctx.moveTo(cx-topW/2,topY);ctx.lineTo(cx-botW/2,botY);
  ctx.lineTo(cx+botW/2,botY);ctx.lineTo(cx+topW/2,topY);ctx.closePath();
  const ng=ctx.createLinearGradient(cx-topW/2,0,cx+topW/2,0);
  ng.addColorStop(0,dark?'#9a7410':'#c8a010');
  ng.addColorStop(0.4,dark?'#d4a017':'#f5c518');
  ng.addColorStop(1,dark?'#9a7410':'#c8a010');
  ctx.fillStyle=ng;ctx.fill();
  ctx.strokeStyle=dark?'rgba(0,0,0,0.2)':'rgba(0,0,0,0.1)';ctx.lineWidth=1;
  for(let s=1;s<segs;s++){
    const t=s/segs,y=topY-t*len,hw=(topW+(botW-topW)*t)/2;
    ctx.beginPath();ctx.moveTo(cx-hw,y);ctx.lineTo(cx+hw,y);ctx.stroke();
  }
}

/* ─── Poulet ──────────────────────────────────────────── */
function drawChicken(i,str){
  const l=lay(i),hy=headY(str,i);
  const act=i===0?true:(i===1?midOn:rightOn);
  const play=playing&&act,t=Date.now();
  const bob=play?Math.sin(t*0.007)*3:0;
  ctx.save();ctx.globalAlpha=act?1:0.38;
  const fc=dark?'#d4a017':'#f5c518',fd=dark?'#9a7410':'#c8a010';
  const bc='#ff9900',rc='#cc2200';
  const nTopY=l.bodyTop+bob,nBotY=hy+l.hR*0.75+bob;
  drawNeck(l.cx,nTopY,nBotY,l.bW*0.28,l.bW*0.22,str);
  ctx.save();ctx.translate(l.cx,l.bodyY+bob);
  ctx.beginPath();ctx.ellipse(0,0,l.bW/2,l.bH/2,0,0,Math.PI*2);
  const bg=ctx.createRadialGradient(-l.bW*0.15,-l.bH*0.15,l.bW*0.04,0,0,l.bW/2);
  bg.addColorStop(0,fc);bg.addColorStop(1,fd);
  ctx.fillStyle=bg;ctx.fill();ctx.strokeStyle=fd;ctx.lineWidth=1.5;ctx.stroke();
  for(const s of[-1,1]){
    ctx.save();ctx.rotate(s*0.22);
    ctx.beginPath();ctx.ellipse(s*l.bW*0.37,l.bH*0.05,l.bW*0.22,l.bH*0.28,s*0.28,0,Math.PI*2);
    ctx.fillStyle=fd;ctx.fill();ctx.restore();
  }
  ctx.save();ctx.translate(0,l.bH*0.38);
  for(let f=-2;f<=2;f++){
    ctx.save();ctx.rotate(f*0.19);
    ctx.beginPath();ctx.ellipse(0,l.bH*0.2,l.bW*0.075,l.bH*0.3,0,0,Math.PI*2);
    ctx.fillStyle=dark?'#a08000':'#e0b000';ctx.fill();ctx.restore();
  }
  ctx.restore();
  const fy=l.bH/2+3;
  ctx.strokeStyle=bc;ctx.lineWidth=Math.max(2,l.bW*0.033);ctx.lineCap='round';
  for(const s of[-1,1]){
    const fx=s*l.bW*0.21,ty=fy+l.bH*0.38;
    ctx.beginPath();
    ctx.moveTo(fx,fy);ctx.lineTo(fx,ty);
    ctx.moveTo(fx,ty);ctx.lineTo(fx-l.bW*0.17,ty+l.bH*0.11);
    ctx.moveTo(fx,ty);ctx.lineTo(fx+l.bW*0.17,ty+l.bH*0.11);
    ctx.moveTo(fx,ty);ctx.lineTo(fx+s*l.bW*0.06,ty+l.bH*0.14);
    ctx.stroke();
  }
  ctx.restore();
  ctx.save();ctx.translate(l.cx,hy+bob);
  if(play){
    const glow=Math.sin(t*0.009)*0.5+0.5;
    ctx.beginPath();ctx.arc(0,0,l.hR+9+glow*5,0,Math.PI*2);
    ctx.fillStyle=dark?`rgba(255,220,0,${0.13+glow*0.09})`:`rgba(255,130,0,${0.15+glow*0.09})`;
    ctx.fill();
  }
  if(togglePulse[i]>0){
    ctx.beginPath();ctx.arc(0,0,l.hR+12+togglePulse[i]*10,0,Math.PI*2);
    ctx.strokeStyle=dark?`rgba(100,200,255,${togglePulse[i]})`:`rgba(0,120,255,${togglePulse[i]})`;
    ctx.lineWidth=3;ctx.stroke();
  }
  ctx.beginPath();ctx.arc(0,0,l.hR,0,Math.PI*2);
  const hg=ctx.createRadialGradient(-l.hR*0.2,-l.hR*0.2,0,0,0,l.hR);
  hg.addColorStop(0,fc);hg.addColorStop(1,fd);
  ctx.fillStyle=hg;ctx.fill();ctx.strokeStyle=fd;ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle=rc;
  for(let c=-1;c<=1;c++){ctx.beginPath();ctx.arc(c*l.hR*0.32,-l.hR*0.78,l.hR*0.22,0,Math.PI*2);ctx.fill();}
  ctx.beginPath();ctx.arc(0,-l.hR*0.90,l.hR*0.27,0,Math.PI*2);ctx.fill();
  for(const wx of[-0.22,0.22]){
    ctx.beginPath();ctx.ellipse(wx*l.hR,l.hR*0.62,l.hR*0.13,l.hR*0.17,wx*0.9,0,Math.PI*2);ctx.fill();
  }
  for(const ex of[-0.35,0.35]){
    ctx.beginPath();ctx.arc(ex*l.hR,-l.hR*0.14,l.hR*0.14,0,Math.PI*2);ctx.fillStyle='#1a1000';ctx.fill();
    ctx.beginPath();ctx.arc(ex*l.hR-l.hR*0.04,-l.hR*0.2,l.hR*0.055,0,Math.PI*2);ctx.fillStyle='white';ctx.fill();
  }
  if(play){
    for(const ex of[-0.35,0.35]){
      ctx.beginPath();ctx.arc(ex*l.hR,-l.hR*0.3,l.hR*0.16,Math.PI*0.2,Math.PI*0.8);
      ctx.strokeStyle='#1a1000';ctx.lineWidth=2;ctx.stroke();
    }
  }
  ctx.beginPath();
  ctx.moveTo(-l.hR*0.21,l.hR*0.25);ctx.lineTo(l.hR*0.21,l.hR*0.25);ctx.lineTo(0,l.hR*0.72);ctx.closePath();
  ctx.fillStyle=bc;ctx.fill();ctx.strokeStyle='#cc7000';ctx.lineWidth=1;ctx.stroke();
  if(!act&&i>0){
    ctx.font=`bold ${l.hR*0.6}px 'Nunito',sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='rgba(150,150,150,0.7)';ctx.fillText('💤',0,0);
  }
  ctx.restore();ctx.restore();
}

/* ─── Particules ─────────────────────────────────────── */
function spawnNote(x,y){
  parts.push({x,y,vx:(Math.random()-.5)*2,vy:-2-Math.random()*2,
    life:1,char:'♩♪♫♬'[Math.floor(Math.random()*4)],
    sz:14+Math.random()*10,col:dark?'#ffd700':'#ff6600'});
}
function drawParticles(){
  for(let k=parts.length-1;k>=0;k--){
    const p=parts[k];p.x+=p.vx;p.y+=p.vy;p.vy*=0.97;p.life-=0.018;
    if(p.life<=0){parts.splice(k,1);continue;}
    ctx.save();ctx.globalAlpha=p.life*0.85;
    ctx.font=`${p.sz}px serif`;ctx.textAlign='center';
    ctx.fillStyle=p.col;ctx.fillText(p.char,p.x,p.y);ctx.restore();
  }
  if(playing&&Math.random()<0.12){
    const act=[true,midOn,rightOn];
    for(let i=0;i<3;i++){
      if(!act[i])continue;
      const l=lay(i),hy_=headY(animStretch,i);
      spawnNote(l.cx+(Math.random()-.5)*44,hy_-l.hR-4);
    }
  }
}

/* ─── HUD ────────────────────────────────────────────── */
function drawHUD(){
  const act=[true,midOn,rightOn];
  const lY=H*0.965;
  const idxs=[currentIdx,compIdx(currentIdx,2),compIdx(currentIdx,4)];
  const names=SCALE_FULL[gamme];
  const gmLbl=gamme==='major'?'Maj':'Min';
  for(let i=0;i<3;i++){
    const l=lay(i);
    ctx.save();ctx.textAlign='center';
    if(i===0){
      ctx.font=`800 13px 'Nunito',sans-serif`;
      ctx.fillStyle=dark?'#ffd700':'#3d2200';
      ctx.fillText('↕ Glisser',l.cx,lY);
      ctx.font=`600 10px 'Nunito',sans-serif`;
      ctx.fillStyle=dark?'#aaa':'#888';
      ctx.fillText(`Fa ${gmLbl} — Fa3 → Fa5`,l.cx,lY+14);
    } else {
      const lbl=i===1?(midOn?'● Tierce ▲':'○ Tierce'):(rightOn?'● Quinte ▲':'○ Quinte');
      ctx.font=`800 13px 'Nunito',sans-serif`;
      ctx.fillStyle=act[i]?(dark?'#ffd700':'#3d2200'):(dark?'#555':'#bbb');
      ctx.fillText(lbl,l.cx,lY);
      ctx.font=`600 10px 'Nunito',sans-serif`;
      ctx.fillStyle=dark?'#555':'#aaa';
      ctx.fillText('Toucher pour activer',l.cx,lY+14);
    }
    ctx.restore();
    if(playing&&act[i]){
      const noteName=names[Math.min(idxs[i],names.length-1)]||'';
      const hy_=headY(animStretch,i),ny=hy_-l.hR-34;
      ctx.save();ctx.textAlign='center';
      ctx.font=`700 14px 'Nunito',sans-serif`;
      const tw=ctx.measureText(noteName).width+20;
      rRect(l.cx-tw/2,ny-13,tw,24,12);
      ctx.fillStyle=dark?'rgba(30,30,0,0.82)':'rgba(255,255,255,0.90)';ctx.fill();
      ctx.fillStyle=dark?(gamme==='major'?'#ffd700':'#88aaff'):(gamme==='major'?'#cc4400':'#2244cc');
      ctx.fillText(noteName,l.cx,ny+4);
      ctx.restore();
    }
  }

  /* Nom instrument affiché en bas à droite */
  const instrLabels={
    flute:'Flûte',trumpet:'Trompette',voice:'Voix',
    piano:'Piano',harpsichord:'Clavecin',organ:'Orgue',synth:'Synth',
    violin:'Violon',guitar:'Guitare',bass:'Basse',banjo:'Banjo',sitar:'Sitar',oud:'Oud',
    xylophone:'Xylophone',marimba:'Marimba'
  };
  ctx.save();
  ctx.textAlign='right';ctx.textBaseline='bottom';
  ctx.font=`600 11px 'Nunito',sans-serif`;
  ctx.fillStyle=dark?'rgba(255,220,120,0.45)':'rgba(80,40,0,0.35)';
  ctx.fillText(instrLabels[sndType]||sndType,W-8,H-4);
  ctx.restore();
}

/* ─── Entrées ─────────────────────────────────────────── */
function colFromX(x){return x<W/3?0:x<2*W/3?1:2;}
function toggleAuto(i){if(i===1){midOn=!midOn;togglePulse[1]=1;}else{rightOn=!rightOn;togglePulse[2]=1;}}
function applyLeftTouch(cy){
  const raw=strFromY(cy);
  currentIdx=snapToScale(raw);
  leftStretch=idxToStretch(currentIdx);
}
cvs.addEventListener('touchstart',e=>{
  e.preventDefault();getAC();
  for(const t of e.changedTouches){
    const col=colFromX(t.clientX),cy=t.clientY-52;
    if(col===0){leftTId=t.identifier;playing=true;applyLeftTouch(cy);}
    else toggleAuto(col);
  }
},{passive:false});
cvs.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){if(t.identifier===leftTId)applyLeftTouch(t.clientY-52);}
},{passive:false});
cvs.addEventListener('touchend',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){if(t.identifier===leftTId){playing=false;leftTId=-1;leftStretch=0;}}
},{passive:false});
cvs.addEventListener('touchcancel',e=>{e.preventDefault();playing=false;leftTId=-1;leftStretch=0;},{passive:false});
let mdown=false;
cvs.addEventListener('mousedown',e=>{
  getAC();const col=colFromX(e.clientX),cy=e.clientY-52;
  if(col===0){mdown=true;playing=true;applyLeftTouch(cy);}else toggleAuto(col);
});
cvs.addEventListener('mousemove',e=>{if(mdown)applyLeftTouch(e.clientY-52);});
cvs.addEventListener('mouseup',()=>{mdown=false;playing=false;leftStretch=0;});
cvs.addEventListener('mouseleave',()=>{mdown=false;playing=false;leftStretch=0;});

/* ─── Contrôles UI ───────────────────────────────────── */
document.getElementById('soundSel').addEventListener('change',e=>{
  sndType=e.target.value;stopAll();if(playing)updateSounds();
});
document.getElementById('scaleBtn').addEventListener('click',()=>{
  gamme=gamme==='major'?'minor':'major';
  const btn=document.getElementById('scaleBtn');
  btn.textContent=gamme==='major'?'Fa Maj ♩':'Fa Min ♩';
  btn.classList.toggle('minor',gamme==='minor');
  stopAll();leftStretch=idxToStretch(currentIdx);
});
document.getElementById('darkBtn').addEventListener('click',()=>{
  dark=!dark;document.body.classList.toggle('dark',dark);
  document.getElementById('darkBtn').textContent=dark?'☀️':'🌙';
});

/* ─── Boucle ─────────────────────────────────────────── */
let last=0;
function loop(now){
  requestAnimationFrame(loop);
  const dt=Math.min((now-last)/1000,0.05)||0.016;last=now;
  const tgt=playing?leftStretch:0;
  stretchVel+=((tgt-animStretch)*22-stretchVel*8)*dt;
  animStretch+=stretchVel*dt;
  animStretch=Math.max(0,Math.min(1,animStretch));
  for(let i=0;i<3;i++)if(togglePulse[i]>0)togglePulse[i]-=dt*3;
  updateSounds();
  ctx.clearRect(0,0,W,H);
  drawBg();drawGaugePanel();
  for(let i=0;i<3;i++)drawChicken(i,animStretch);
  drawParticles();drawHUD();
}
requestAnimationFrame(loop);
</script>
