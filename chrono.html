<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Chrono</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400&display=swap');

  :root {
    --bg: #f0ede8;
    --surface: #e8e4de;
    --text: #1a1714;
    --muted: #8a8480;
    --accent: #c84b2f;
    --btn-bg: #ddd9d2;
    --btn-border: #b0aba4;
    --btn-text: #3a3632;
    --lap-bg: rgba(0,0,0,0.04);
    --lap-border: rgba(0,0,0,0.08);
  }

  [data-theme="dark"] {
    --bg: #111110;
    --surface: #1c1b19;
    --text: #f0ede8;
    --muted: #6a6460;
    --accent: #e05a38;
    --btn-bg: #252421;
    --btn-border: #3a3835;
    --btn-text: #c0bdb8;
    --lap-bg: rgba(255,255,255,0.03);
    --lap-border: rgba(255,255,255,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%; width: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    transition: background 0.3s, color 0.3s;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    user-select: none;
  }

  /* Bouton mode */
  #theme-toggle {
    position: absolute;
    top: 18px; right: 18px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 18px;
    padding: 6px;
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  #theme-toggle:hover { opacity: 1; }

  /* Affichage principal */
  .display-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    flex: 1;
    justify-content: center;
    width: 100%;
  }

  #time-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(96px, 30vw, 200px);
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1;
    transition: color 0.3s;
  }

  #time-display.running-REMOVE {
    color: var(--accent);
  }

  #ms-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(30px, 9vw, 60px);
    color: var(--muted);
    letter-spacing: 0.1em;
    transition: color 0.3s;
  }

  /* Laps */
  #laps-container {
    width: 100%;
    max-width: 340px;
    max-height: 28vh;
    overflow-y: auto;
    padding: 0 20px;
    scrollbar-width: none;
  }
  #laps-container::-webkit-scrollbar { display: none; }

  .lap-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 10px;
    background: var(--lap-bg);
    border-bottom: 1px solid var(--lap-border);
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.03em;
    animation: fadeIn 0.15s ease;
  }
  .lap-item:first-child { border-top: 1px solid var(--lap-border); }
  .lap-num { color: var(--muted); font-size: 12px; }
  .lap-time { font-family: 'Share Tech Mono', monospace; font-size: 15px; }
  .lap-split { font-family: 'Share Tech Mono', monospace; font-size: 13px; color: var(--muted); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Barre boutons bas */
  .controls {
    width: 100%;
    padding: 0 24px 36px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 12px;
  }

  .btn-group {
    display: flex;
    gap: 10px;
  }

  .btn {
    background: var(--btn-bg);
    border: 1px solid var(--btn-border);
    color: var(--btn-text);
    border-radius: 50px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 9px 18px;
    transition: background 0.15s, transform 0.1s, color 0.2s, border-color 0.2s;
    white-space: nowrap;
  }

  .btn:active { transform: scale(0.93); }

  #btn-start {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    min-width: 70px;
  }
  #btn-start:hover { opacity: 0.9; }

  #btn-lap, #btn-reset {
    opacity: 0.6;
  }
  #btn-lap:not(:disabled), #btn-reset:not(:disabled) { opacity: 1; }
  #btn-lap:disabled, #btn-reset:disabled { opacity: 0.3; cursor: default; }
</style>
</head>
<body>

<button id="theme-toggle" title="Mode clair/sombre" aria-label="Basculer le thème">☀</button>

<div class="display-wrap">
  <div id="time-display">00:00</div>
  <div id="ms-display">.00</div>
  <div id="laps-container"></div>
</div>

<div class="controls">
  <div class="btn-group">
    <button class="btn" id="btn-start">START</button>
  </div>
  <div class="btn-group">
    <button class="btn" id="btn-lap" disabled>LAP</button>
    <button class="btn" id="btn-reset" disabled>RESET</button>
  </div>
</div>

<script>
  // ─── Wake Lock (always on) ───────────────────────────────────────────────
  let wakeLock = null;
  async function requestWakeLock() {
    if ('wakeLock' in navigator) {
      try {
        wakeLock = await navigator.wakeLock.request('screen');
      } catch(e) {}
    }
  }
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') requestWakeLock();
  });
  requestWakeLock();

  // ─── Thème ───────────────────────────────────────────────────────────────
  const root = document.documentElement;
  const themeBtn = document.getElementById('theme-toggle');
  let dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  function applyTheme() {
    root.dataset.theme = dark ? 'dark' : 'light';
    themeBtn.textContent = dark ? '☾' : '☀';
  }
  applyTheme();
  themeBtn.addEventListener('click', () => { dark = !dark; applyTheme(); });

  // ─── Chrono ──────────────────────────────────────────────────────────────
  const display   = document.getElementById('time-display');
  const msDisplay = document.getElementById('ms-display');
  const lapsContainer = document.getElementById('laps-container');
  const btnStart  = document.getElementById('btn-start');
  const btnLap    = document.getElementById('btn-lap');
  const btnReset  = document.getElementById('btn-reset');

  let running = false;
  let startTime = 0;
  let elapsed = 0;
  let rafId = null;
  let laps = [];
  let lastLapTime = 0;

  function pad(n, len = 2) { return String(n).padStart(len, '0'); }

  function formatTime(ms) {
    const totalSec = Math.floor(ms / 1000);
    const m = Math.floor(totalSec / 60);
    const s = totalSec % 60;
    const cs = Math.floor((ms % 1000) / 10);
    return { main: `${pad(m)}:${pad(s)}`, ms: `.${pad(cs)}` };
  }

  function render(ms) {
    const { main, ms: msStr } = formatTime(ms);
    display.textContent = main;
    msDisplay.textContent = msStr;
  }

  function tick() {
    const now = performance.now();
    const total = elapsed + (now - startTime);
    render(total);
    rafId = requestAnimationFrame(tick);
  }

  function getTotal() {
    if (running) return elapsed + (performance.now() - startTime);
    return elapsed;
  }

  btnStart.addEventListener('click', () => {
    if (!running) {
      startTime = performance.now();
      running = true;
      rafId = requestAnimationFrame(tick);
      btnStart.textContent = 'STOP';
      
      btnLap.disabled = false;
      btnReset.disabled = false;
    } else {
      elapsed += performance.now() - startTime;
      running = false;
      cancelAnimationFrame(rafId);
      btnStart.textContent = 'START';
      
    }
  });

  btnLap.addEventListener('click', () => {
    if (!running && elapsed === 0) return;
    const total = getTotal();
    const split = total - lastLapTime;
    lastLapTime = total;
    laps.unshift({ num: laps.length + 1, total, split });
    renderLaps();
  });

  btnReset.addEventListener('click', () => {
    if (running) {
      elapsed += performance.now() - startTime;
      running = false;
      cancelAnimationFrame(rafId);
      
      btnStart.textContent = 'START';
    }
    elapsed = 0; startTime = 0; lastLapTime = 0;
    laps = [];
    render(0);
    renderLaps();
    btnLap.disabled = true;
    btnReset.disabled = true;
  });

  function renderLaps() {
    lapsContainer.innerHTML = '';
    laps.forEach(l => {
      const { main: tm, ms: tms } = formatTime(l.total);
      const { main: sm, ms: sms } = formatTime(l.split);
      const div = document.createElement('div');
      div.className = 'lap-item';
      div.innerHTML = `
        <span class="lap-num">Tour ${pad(l.num)}</span>
        <span class="lap-split">${sm}${sms}</span>
        <span class="lap-time">${tm}${tms}</span>`;
      lapsContainer.appendChild(div);
    });
  }

  render(0);
</script>
</body>
</html>
