<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pendu</title>
  <style>
    :root {
      --bg: #ffffff;
      --bg-alt: #f5f5f5;
      --text: #1a1a1a;
      --text-light: #666666;
      --border: #e0e0e0;
      --primary: #2563eb;
      --primary-alt: #1e40af;
      --success: #16a34a;
      --danger: #dc2626;
      --accent: #f97316;
    }

    [data-theme="dark"] {
      --bg: #0f0f0f;
      --bg-alt: #1a1a1a;
      --text: #ffffff;
      --text-light: #a0a0a0;
      --border: #333333;
      --primary: #3b82f6;
      --primary-alt: #2563eb;
      --success: #22c55e;
      --danger: #ef4444;
      --accent: #fb923c;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 14px;
      padding: 0;
      overflow: hidden;
      transition: background 0.2s, color 0.2s;
    }

    .container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 2px solid var(--border);
      background: var(--bg-alt);
    }

    .title {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -1px;
      text-transform: uppercase;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .toggle-btn {
      width: 40px;
      height: 40px;
      border: 2px solid var(--border);
      background: var(--bg);
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      border-radius: 0;
    }

    .toggle-btn:active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
      transform: scale(0.95);
    }

    /* Main Game Area */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px;
      overflow-y: auto;
      gap: 20px;
      justify-content: flex-start;
    }

    /* Game Board */
    .board {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    /* Hangman Visual */
    .hangman {
      display: flex;
      justify-content: center;
      align-items: center;
      aspect-ratio: 1;
      background: var(--bg-alt);
      border: 2px solid var(--border);
      position: relative;
      min-height: 120px;
    }

    .hangman-stages {
      position: relative;
      width: 80px;
      height: 100px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .hangman-part {
      position: absolute;
      opacity: 0;
      transition: opacity 0.2s;
      stroke: var(--text);
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
    }

    .hangman-part.visible {
      opacity: 1;
    }

    /* Word Display */
    .word-display {
      background: var(--bg-alt);
      border: 2px solid var(--border);
      padding: 20px;
      text-align: center;
      font-size: 32px;
      letter-spacing: 8px;
      font-weight: 700;
      font-family: 'Courier New', monospace;
      word-break: break-all;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      grid-column: 1 / -1;
    }

    /* Stats */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      grid-column: 1 / -1;
    }

    .stat-box {
      background: var(--bg-alt);
      border: 2px solid var(--border);
      padding: 12px;
      text-align: center;
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-light);
      text-transform: uppercase;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 900;
    }

    /* Keyboard */
    .keyboard {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
      margin-bottom: 20px;
    }

    .letter-btn {
      aspect-ratio: 1;
      border: 2px solid var(--border);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
      transition: all 0.1s;
      border-radius: 0;
    }

    .letter-btn:active {
      transform: scale(0.95);
    }

    .letter-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .letter-btn.correct {
      background: var(--success);
      color: white;
      border-color: var(--success);
    }

    .letter-btn.wrong {
      background: var(--danger);
      color: white;
      border-color: var(--danger);
    }

    /* Modal */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: var(--bg);
      border: 3px solid var(--text);
      padding: 30px;
      text-align: center;
      max-width: 80vw;
      animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes popIn {
      from {
        transform: scale(0.5);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .modal-title {
      font-size: 32px;
      font-weight: 900;
      margin-bottom: 16px;
      letter-spacing: -1px;
      text-transform: uppercase;
    }

    .modal-word {
      font-size: 24px;
      margin: 20px 0;
      font-family: 'Courier New', monospace;
      word-break: break-all;
    }

    .modal-message {
      font-size: 14px;
      color: var(--text-light);
      margin-bottom: 24px;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .btn {
      padding: 12px 24px;
      border: 2px solid var(--text);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      font-family: 'JetBrains Mono', monospace;
      transition: all 0.1s;
      border-radius: 0;
      text-transform: uppercase;
    }

    .btn:active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
      transform: scale(0.95);
    }

    .btn.success {
      border-color: var(--success);
    }

    .btn.danger {
      border-color: var(--danger);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .main {
        padding: 16px;
        gap: 16px;
      }

      .keyboard {
        grid-template-columns: repeat(6, 1fr);
        gap: 5px;
      }

      .letter-btn {
        font-size: 12px;
      }

      .word-display {
        font-size: 24px;
        letter-spacing: 4px;
      }

      .board {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .hangman {
        min-height: 140px;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="title">PENDU</div>
    <div class="controls">
      <button class="toggle-btn" id="soundToggle" title="Son">🔊</button>
      <button class="toggle-btn" id="vibrationToggle" title="Vibration">📳</button>
      <button class="toggle-btn" id="themeToggle" title="Thème">🌙</button>
    </div>
  </div>

  <div class="main">
    <div class="board">
      <div class="hangman">
        <svg class="hangman-stages" viewBox="0 0 100 120">
          <!-- Tête -->
          <circle class="hangman-part" id="head" cx="50" cy="30" r="15"/>
          <!-- Corps -->
          <line class="hangman-part" id="body" x1="50" y1="45" x2="50" y2="70"/>
          <!-- Bras gauche -->
          <line class="hangman-part" id="leftArm" x1="50" y1="55" x2="35" y2="70"/>
          <!-- Bras droit -->
          <line class="hangman-part" id="rightArm" x1="50" y1="55" x2="65" y2="70"/>
          <!-- Jambe gauche -->
          <line class="hangman-part" id="leftLeg" x1="50" y1="70" x2="35" y2="95"/>
          <!-- Jambe droite -->
          <line class="hangman-part" id="rightLeg" x1="50" y1="70" x2="65" y2="95"/>
        </svg>
      </div>

      <div class="word-display" id="wordDisplay"></div>

      <div class="stats">
        <div class="stat-box">
          <div class="stat-label">Erreurs</div>
          <div class="stat-value" id="errorCount">0/6</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Trouvées</div>
          <div class="stat-value" id="foundCount">0</div>
        </div>
      </div>
    </div>

    <div class="keyboard" id="keyboard"></div>
  </div>
</div>

<div class="modal" id="gameModal">
  <div class="modal-content">
    <div class="modal-title" id="modalTitle">Gagné !</div>
    <div class="modal-message" id="modalMessage"></div>
    <div class="modal-word" id="modalWord"></div>
    <div class="btn-group">
      <button class="btn success" onclick="startNewGame()">Nouveau jeu</button>
    </div>
  </div>
</div>

<script>
  // Configuration
  const WORDS = [
    'papillon', 'chocolat', 'pluie', 'montagne', 'soleil',
    'tortue', 'fromage', 'cerise', 'fenêtre', 'musique',
    'cheval', 'gâteau', 'plage', 'étoile', 'piano',
    'girafe', 'pizza', 'forêt', 'nuage', 'danse',
    'tigre', 'fraise', 'rivière', 'lune', 'chanson',
    'maison', 'jardin', 'papier', 'fleur', 'brique',
    'ballon', 'poisson', 'arbre', 'vent', 'sandwich',
    'chaussette', 'parapluie', 'vacances', 'sourire', 'rêve',
    'skateboard', 'renard', 'sandwich', 'coucher de soleil', 'poésie',
    'vélo', 'printemps', 'océan', 'papaye', 'feu d\'artifice'
  ];

  const HANGMAN_PARTS = ['head', 'body', 'leftArm', 'rightArm', 'leftLeg', 'rightLeg'];
  const MAX_ERRORS = 6;

  // State
  let gameState = {
    word: '',
    guessed: new Set(),
    errors: 0,
    soundEnabled: true,
    vibrationEnabled: true,
    gameOver: false,
    won: false
  };

  // Initialize
  function init() {
    loadPreferences();
    setTheme(localStorage.getItem('theme') || 'light');
    setupEventListeners();
    startNewGame();
  }

  function loadPreferences() {
    gameState.soundEnabled = localStorage.getItem('sound') !== 'false';
    gameState.vibrationEnabled = localStorage.getItem('vibration') !== 'false';
    updateToggleButtons();
  }

  function setupEventListeners() {
    document.getElementById('themeToggle').addEventListener('click', toggleTheme);
    document.getElementById('soundToggle').addEventListener('click', toggleSound);
    document.getElementById('vibrationToggle').addEventListener('click', toggleVibration);
  }

  // Game Functions
  function startNewGame() {
    gameState.word = WORDS[Math.floor(Math.random() * WORDS.length)].toUpperCase();
    gameState.guessed = new Set();
    gameState.errors = 0;
    gameState.gameOver = false;
    gameState.won = false;

    document.getElementById('gameModal').classList.remove('show');
    renderKeyboard();
    updateDisplay();
  }

  function guessLetter(letter) {
    if (gameState.gameOver || gameState.guessed.has(letter)) return;

    gameState.guessed.add(letter);
    const isCorrect = gameState.word.includes(letter);

    if (!isCorrect) {
      gameState.errors++;
      playSound('error');
      vibrate(200);
    } else {
      playSound('success');
      vibrate([100, 50, 100]);
    }

    checkGameStatus();
    updateDisplay();
  }

  function checkGameStatus() {
    const wordLetters = new Set(gameState.word);
    const foundLetters = [...wordLetters].filter(l => gameState.guessed.has(l));

    if (foundLetters.length === wordLetters.size) {
      gameState.won = true;
      gameState.gameOver = true;
      playSound('win');
      vibrate([100, 50, 100, 50, 100]);
      endGame(true);
    } else if (gameState.errors >= MAX_ERRORS) {
      gameState.gameOver = true;
      playSound('lose');
      vibrate(500);
      endGame(false);
    }
  }

  function endGame(won) {
    const modal = document.getElementById('gameModal');
    const title = document.getElementById('modalTitle');
    const message = document.getElementById('modalMessage');
    const word = document.getElementById('modalWord');

    if (won) {
      title.textContent = '🎉 GAGNÉ !';
      title.style.color = 'var(--success)';
      message.textContent = `Vous avez deviné le mot en ${gameState.errors} erreur${gameState.errors !== 1 ? 's' : ''} !`;
    } else {
      title.textContent = '💀 PERDU';
      title.style.color = 'var(--danger)';
      message.textContent = `Le mot était :`;
    }

    word.textContent = gameState.word;
    modal.classList.add('show');
  }

  // Display Functions
  function updateDisplay() {
    updateWordDisplay();
    updateErrorCount();
    updateHangman();
  }

  function updateWordDisplay() {
    const display = gameState.word
      .split('')
      .map(l => gameState.guessed.has(l) ? l : '_')
      .join(' ');
    document.getElementById('wordDisplay').textContent = display;
  }

  function updateErrorCount() {
    document.getElementById('errorCount').textContent = `${gameState.errors}/${MAX_ERRORS}`;
    const foundCount = new Set([...gameState.word].filter(l => gameState.guessed.has(l))).size;
    document.getElementById('foundCount').textContent = foundCount;
  }

  function updateHangman() {
    HANGMAN_PARTS.forEach((part, index) => {
      const element = document.getElementById(part);
      if (index < gameState.errors) {
        element.classList.add('visible');
      } else {
        element.classList.remove('visible');
      }
    });
  }

  function renderKeyboard() {
    const keyboard = document.getElementById('keyboard');
    keyboard.innerHTML = '';

    for (let i = 65; i <= 90; i++) {
      const letter = String.fromCharCode(i);
      const btn = document.createElement('button');
      btn.className = 'letter-btn';
      btn.textContent = letter;
      btn.disabled = gameState.guessed.has(letter);

      if (gameState.guessed.has(letter)) {
        const isCorrect = gameState.word.includes(letter);
        btn.classList.add(isCorrect ? 'correct' : 'wrong');
      }

      btn.addEventListener('click', () => {
        guessLetter(letter);
        renderKeyboard();
      });

      keyboard.appendChild(btn);
    }
  }

  // Theme
  function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme') || 'light';
    const newTheme = current === 'light' ? 'dark' : 'light';
    setTheme(newTheme);
    localStorage.setItem('theme', newTheme);
  }

  function setTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    document.getElementById('themeToggle').textContent = theme === 'dark' ? '☀️' : '🌙';
  }

  // Sound
  function toggleSound() {
    gameState.soundEnabled = !gameState.soundEnabled;
    localStorage.setItem('sound', gameState.soundEnabled);
    updateToggleButtons();
  }

  function playSound(type) {
    if (!gameState.soundEnabled) return;

    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = audioContext.createOscillator();
    const gainNode = audioContext.createGain();

    oscillator.connect(gainNode);
    gainNode.connect(audioContext.destination);

    switch (type) {
      case 'success':
        oscillator.frequency.value = 800;
        gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + 0.2);
        break;
      case 'error':
        oscillator.frequency.value = 300;
        gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + 0.3);
        break;
      case 'win':
        oscillator.frequency.setValueAtTime(600, audioContext.currentTime);
        oscillator.frequency.setValueAtTime(800, audioContext.currentTime + 0.1);
        oscillator.frequency.setValueAtTime(1000, audioContext.currentTime + 0.2);
        gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.4);
        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + 0.4);
        break;
      case 'lose':
        oscillator.frequency.setValueAtTime(500, audioContext.currentTime);
        oscillator.frequency.setValueAtTime(400, audioContext.currentTime + 0.2);
        oscillator.frequency.setValueAtTime(300, audioContext.currentTime + 0.4);
        gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.6);
        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + 0.6);
        break;
    }
  }

  // Vibration
  function toggleVibration() {
    gameState.vibrationEnabled = !gameState.vibrationEnabled;
    localStorage.setItem('vibration', gameState.vibrationEnabled);
    updateToggleButtons();
  }

  function vibrate(pattern) {
    if (!gameState.vibrationEnabled || !navigator.vibrate) return;
    navigator.vibrate(pattern);
  }

  // UI Helpers
  function updateToggleButtons() {
    const soundBtn = document.getElementById('soundToggle');
    const vibBtn = document.getElementById('vibrationToggle');
    soundBtn.style.opacity = gameState.soundEnabled ? '1' : '0.4';
    vibBtn.style.opacity = gameState.vibrationEnabled ? '1' : '0.4';
  }

  // Start
  init();
</script>

</body>
</html>
